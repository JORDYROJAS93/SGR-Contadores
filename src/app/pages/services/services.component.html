<section class="services-section py-3 bg-light">
  <div class="container">
    <!-- Título -->
    <h2 class="text-center mb-4 fw-bold" style="color: #1a1a1a;">Nuestros Servicios</h2>
    <p class="text-center mb-5 text-muted" style="max-width: 700px; margin-left: auto; margin-right: auto;">
      Ofrecemos soluciones integrales en contabilidad, fiscalidad, planillas y más, diseñadas para impulsar tu negocio con precisión y profesionalismo.
    </p>

    <!-- Grid de servicios -->
    <div class="row g-5">
      <div class="col-md-6 col-lg-4" *ngFor="let service of services">
        <div class="card h-100 border-0 shadow-sm"
             style="border-radius: 16px; transition: transform 0.3s ease, box-shadow 0.3s ease; height: 100%;">
          
          <!-- Efecto hover -->
          <div style="padding: 2px; border-radius: 16px; background: linear-gradient(135deg, #0d6efd, #0b5ed7);">
            <div class="card-body d-flex flex-column text-center p-4"
                 style="background: white; border-radius: 15px; height: 100%;">

              <!-- Icono -->
              <div class="service-icon mb-3 text-primary fs-1">
                <i [class]="service.icon" style="transition: transform 0.3s;"></i>
              </div>

              <!-- Título y descripción -->
              <h5 class="card-title mb-3 fw-semibold" style="color: #1a1a1a;">{{ service.title }}</h5>
              <p class="card-text text-muted mb-4" style="flex: 1; line-height: 1.6;">
                {{ service.description }}
              </p>

              <!-- Botón -->
              <button class="btn btn-outline-primary mt-auto py-2"
                      style="border-radius: 8px; font-weight: 500;"
                      (click)="solicitarServicio(service)">
                Solicitar servicio
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
